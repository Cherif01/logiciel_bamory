<div class="container-fluid mt-4">
  <!-- Header avec titre et bouton -->
  <div class="card g-4">
    <div class="row">
      <div class="col text-start">
        <h4 class="text-uppercase fw-bold">{{ title }}</h4>
      </div>
      <div class="col text-right">
        <!-- <button mat-raised-button color="primary">
                  <mat-icon>add</mat-icon>
                  Affectation
              </button> -->
      </div>
    </div>
  </div>

  <div class="row g-4">
    <!-- Formulaire -->
    <div class="col-lg-3 col-md-4 col-12 p-0">
      <mat-card class="mb-3 pb-3 w-100 card-form bg-white">
        <h3 class="form-title text-center text-uppercase p-2" style="font-weight: bold">
          Nouveau Fournisseur
        </h3>
        <div class="text-center py-2">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuWfsxXJE-q6tDJ2hvRHJcL3HsD--WPYJuNg&s"
            id="img-round1" alt />
        </div>
        <form [formGroup]="Fournisseur">
          <div class="d-flex align-items-center justify-content-between flex-wrap">
            <div class="col-12">
              <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label>Prenom</mat-label>
                <input matInput formControlName="prenom" placeholder="Exemple : Oumar" />
              </mat-form-field>
            </div>
            <div class="col-12">
              <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label>Nom</mat-label>
                <input matInput formControlName="nom" placeholder="Exemple : Oumar" />
              </mat-form-field>
            </div>
          </div>
          <div class="col-12">
            <mat-form-field appearance="outline" class="w-100 mb-3">
              <mat-label>Adresse</mat-label>
              <input matInput formControlName="adresse" placeholder="Exemple : Siguiri" />
            </mat-form-field>
          </div>
          <div class="col-12">
            <mat-form-field appearance="outline" class="w-100 mb-3">
              <mat-label>Contact</mat-label>
              <input matInput formControlName="contact" placeholder="Exemple : 624 22 67 78" />
            </mat-form-field>
          </div>
          <div class="col-12">
            <button mat-raised-button color="primary" [disabled]="Fournisseur.invalid" type="button" class="w-100"
              (click)="onAjouter()">
              <mat-icon class="me-2">add_circle</mat-icon>
              <span>Ajouter</span>
            </button>
          </div>
        </form>
      </mat-card>
    </div>

    <!-- Tableau -->
    <div class="col">
      <mat-card class="shadow-sm">
        <div class="table-responsive p-3">
          <h3 class="form-title text-center text-primary mb-3">
            Listes des Fournisseur
          </h3>
          <mat-form-field class="w-100 mb-3" appearance="outline">
            <mat-label>Rechercher...</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Rechercher" #input />
          </mat-form-field>

          <table mat-table [dataSource]="dataSource" id="maTable">
            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef>#</th>
              <td mat-cell *matCellDef="let i = index">{{ i + 1 }}</td>
            </ng-container>

            <ng-container matColumnDef="nomComplet">
              <th mat-header-cell *matHeaderCellDef>Fournisseur</th>
              <td mat-cell *matCellDef="let element">
                {{ element.prenom + ' '+element.nom }}
              </td>
            </ng-container>
            <ng-container matColumnDef="adresse">
              <th mat-header-cell *matHeaderCellDef>Adresse</th>
              <td mat-cell *matCellDef="let element">{{ element.adresse }}</td>
            </ng-container>
            <ng-container matColumnDef="contact">
              <th mat-header-cell *matHeaderCellDef>Adresse</th>
              <td mat-cell *matCellDef="let element">{{ element.contact }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let element">
                <div class="d-flex gap-2 justify-content-center">
                  <button class="mx-2" mat-stroked-button color="primary"
                    routerLink="/contact/fournisseur-details/{{ element.id }}">
                    <mat-icon>visibility</mat-icon>
                  </button>

                  <button class="mx-2" mat-stroked-button color="warn"
                    (click)="deleteFunction(element.id, 'Fournisseurs')">
                    <mat-icon>delete</mat-icon>
                  </button>

                  <button class="mx-2" mat-raised-button color="accent"
                    routerLink="/contact/fournisseur-rapport/{{ element.id }}">
                    <mat-icon>print</mat-icon>
                  </button>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
          <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
        </div>
      </mat-card>
    </div>
  </div>
</div>
