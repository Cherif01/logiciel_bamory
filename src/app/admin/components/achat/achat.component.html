<div class="container-fluid mt-4">
  <!-- Header avec titre et bouton -->
  <div class="card g-4">
    <div class="row">
      <div class="col text-start">
        <h4 class="text-uppercase fw-bold">{{ title }}</h4>
      </div>
      <div class="col text-right">
        <button mat-raised-button color="primary" (click)="dialogInitAchat()">
          <mat-icon>add_circle</mat-icon>
          Nouveau achat
        </button>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <!--   -->
    <div class="col">
      <mat-card class="shadow-sm">
        <div class="table-responsive">
          <h3 class="form-title text-center text-primary mb-3">
            Tous les achats </h3>
          <mat-form-field class="w-100 mb-3" appearance="outline">
            <mat-label>Rechercher...</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Rechercher" #input />
          </mat-form-field>

          <table mat-table [dataSource]="dataSource" id="maTable">
            <ng-container matColumnDef="id">
              <th mat-header-cell *matHeaderCellDef>#</th>
              <td mat-cell *matCellDef="let i = index">{{ i + 1 }}</td>
            </ng-container>

            <ng-container matColumnDef="fournisseur">
              <th mat-header-cell *matHeaderCellDef>Fournisseur</th>
              <td mat-cell *matCellDef="let element">
                {{ element.prenom + ' '+element.nom }}
              </td>
            </ng-container>
            <ng-container matColumnDef="poids">
              <th mat-header-cell *matHeaderCellDef>Poids</th>
              <td mat-cell *matCellDef="let element">{{ element.poids | currency: ' '}}</td>
            </ng-container>
            <ng-container matColumnDef="carrat">
              <th mat-header-cell *matHeaderCellDef>Carrat</th>
              <td mat-cell *matCellDef="let element">{{ element.carrat | currency: ' '}}</td>
            </ng-container>
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Etat</th>
              <td mat-cell *matCellDef="let element"><span [ngClass]="element._class">{{ element.statut }}</span></td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
              <td mat-cell *matCellDef="let element" class="text-center">
                <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Options">
                  <mat-icon>menu</mat-icon>
                </button>

                <mat-menu #menu="matMenu">

                  <button mat-menu-item>
                    <mat-icon color="primary">menu</mat-icon>
                    <span>Ajouter les barres</span>
                  </button>

                  <button mat-menu-item (click)="dialogPanierAchat(element.id)">
                    <mat-icon color="primary">edit</mat-icon>
                    <span>Ajouter les barres</span>
                  </button>

                  <button mat-menu-item (click)="voirFactureAchat(element.id)">
                    <mat-icon color="accent">receipt_long</mat-icon>
                    <span>Facture achat</span>
                  </button>

                  <button mat-menu-item (click)="deleteFunction(element.id, 'Fournisseurs')">
                    <mat-icon color="warn">delete</mat-icon>
                    <span>Supprimer</span>
                  </button>
                </mat-menu>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
          <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
        </div>
      </mat-card>
    </div>
  </div>
</div>
