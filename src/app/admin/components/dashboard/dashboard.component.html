<div class="container-fluid p-4">

  <!-- 4 Cards RH -->
  <div class="row g-3 mb-4">
    <div *ngFor="let card of [
        { title: 'Fourniseurs', value: total, color: 'primary' },
        { title: 'Clients', value: presents, color: 'success' },
        { title: 'Achat en cours', value: enConge, color: 'warning' },
        { title: 'Solde', value: absents, color: 'danger' },
      ]" class="col-md-3">
      <div [ngClass]="'bg-' + card.color + '-subtle'" class="card shadow-sm text-center">
        <div class="card-body">
          <h2 class="card-title fw-bold text-{{ card.color }}">{{ card.title }}</h2>
          <p class="display-5">{{ card.value }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Graphique ligne + secteur -->
  <div class="row g-3">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-bold">
          Évolution du personnel
        </div>
        <div class="card-body">
          <div id="linechart" style="width: 100%; height: 400px;"></div>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm h-100 p-3">
        <div class="card-header bg-info text-white fw-bold">
          Répartition actuelle
        </div>
        <div class="card-body p-0 d-flex align-items-center justify-content-center">
          <div id="piechart" style="width: 100%; height: 400px;"></div>
        </div>
      </div>
    </div>
  </div>
</div>
