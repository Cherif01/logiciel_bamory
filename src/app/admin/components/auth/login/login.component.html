<div class="login-form">
  <h2 class="text-uppercase">Identifiez vous ?</h2>
  <hr>
  <div class="logo-entreprise">
    <img
      src="https://png.pngtree.com/png-vector/20241229/ourmid/pngtree-flat-design-illustration-of-a-password-field-with-lock-icon-and-vector-png-image_14943314.png"
      style="height: 150; width: 150px;" alt="">
  </div>
  <form [formGroup]="formLogin">
    <div class="col-12">
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Nom d'utilisateur</mat-label>
        <input type="text" formControlName="username" matInput placeholder="Nom d'utilisateur">
      </mat-form-field>
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Mot de passe</mat-label>
        <input type="password" formControlName="password" matInput placeholder="Ex : 0000">
      </mat-form-field>
      <button [disabled]="formLogin.invalid" mat-flat-button color="primary" class="w-100">Valider</button>
    </div>
  </form>
</div>
